<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subarna Admin - Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f7fafc; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; }
        h1, h2 { font-family: 'Playfair Display', serif; color: #1a202c; margin-top: 0; }
        
        /* Form Styling */
        .form-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e0; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        textarea { grid-column: span 2; height: 80px; resize: vertical; }
        
        .btn-add { background: #48bb78; color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-add:hover { background: #38a169; }

        /* Table Styling */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th { text-align: left; background: #edf2f7; padding: 15px; color: #4a5568; font-size: 14px; }
        td { padding: 15px; border-bottom: 1px solid #edf2f7; vertical-align: top; }
        .del-btn { background: #e53e3e; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .del-btn:hover { background: #c53030; }
        .price-tag { color: #2f855a; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Subarna Inventory Manager</h1>

    <div class="card">
        <h2>Add New Product</h2>
        <div class="form-group">
            <input type="text" id="p-name" placeholder="Product Name (e.g. Baluchari Saree)">
            <input type="number" id="p-price" placeholder="Price (INR)">
            <input type="text" id="p-img" placeholder="Image URL">
            <textarea id="p-desc" placeholder="Product Description (Materials, size, care instructions...)"></textarea>
        </div>
        <button class="btn-add" onclick="addProduct()">Add to Shop</button>
    </div>

    <div class="card">
        <h2>Current Shop Inventory</h2>
        <table>
            <thead>
                <tr>
                    <th>Product & Description</th>
                    <th>Price</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="inventory-list">
                <tr><td colspan="3">Loading items...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="card">
        <h2>Recent Customer Orders</h2>
        <table>
            <thead>
                <tr>
                    <th>Customer</th>
                    <th>Product</th>
                    <th>Contact</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="orders-list">
                <tr><td colspan="4">Loading orders...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const BACKEND_URL = "https://subarna-apparel.onrender.com";

    // 1. Fetch All Data
    async function loadDashboard() {
        try {
            // Load Products
            const pRes = await fetch(`${BACKEND_URL}/products`);
            const products = await pRes.json();
            const pList = document.getElementById('inventory-list');
            pList.innerHTML = products.length ? products.map(p => `
                <tr>
                    <td>
                        <strong>${p.name}</strong><br>
                        <small style="color: #718096;">${p.description || 'No description'}</small>
                    </td>
                    <td class="price-tag">₹${p.price}</td>
                    <td><button class="del-btn" onclick="deleteItem('products', ${p.id})">Delete</button></td>
                </tr>
            `).join('') : '<tr><td colspan="3">No products in shop.</td></tr>';

            // Load Orders
            const oRes = await fetch(`${BACKEND_URL}/orders`);
            const orders = await oRes.json();
            const oList = document.getElementById('orders-list');
            oList.innerHTML = orders.length ? orders.map(o => `
                <tr>
                    <td><strong>${o.customer_name}</strong></td>
                    <td>${o.product_name}</td>
                    <td>${o.phone || 'N/A'}</td>
                    <td><button class="del-btn" onclick="deleteItem('orders', '${o.id}')">Delete Order</button></td>
                </tr>
            `).join('') : '<tr><td colspan="4">No orders yet.</td></tr>';

        } catch (err) {
            console.error("Dashboard error:", err);
        }
    }

    // 2. Add Product with Description
    async function addProduct() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const image_url = document.getElementById('p-img').value;
        const description = document.getElementById('p-desc').value;

        if(!name || !price) return alert("Please fill Name and Price");

        try {
            const res = await fetch(`${BACKEND_URL}/products`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, price: parseFloat(price), image_url, description })
            });
            if(res.ok) {
                alert("Product Added!");
                location.reload();
            }
        } catch (err) { alert("Error adding product"); }
    }

    // 3. Delete Item (Generic for products or orders)
    async function deleteItem(type, id) {
        if(!confirm(`Are you sure you want to delete this ${type.slice(0,-1)}?`)) return;
        try {
            const res = await fetch(`${BACKEND_URL}/${type}/${id}`, { method: 'DELETE' });
            if(res.ok) {
                alert("Deleted successfully!");
                loadDashboard();
            }
        } catch (err) { alert("Delete failed"); }
    }

    // Initial Load
    loadDashboard();
</script>

</body>
</html>
