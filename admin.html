<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subarna Apparel - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f7fafc; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { font-family: 'Playfair Display', serif; color: #1a202c; border-bottom: 2px solid #edf2f7; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; background: #edf2f7; padding: 12px; color: #4a5568; }
        td { padding: 12px; border-bottom: 1px solid #edf2f7; color: #2d3748; }
        .delete-btn { background: #e53e3e; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: background 0.2s; }
        .delete-btn:hover { background: #c53030; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; background: #ebf8ff; color: #2b6cb0; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Order Management</h1>
    <p>Viewing live orders for <strong>Subarna Apparel</strong></p>

    <table>
        <thead>
            <tr>
                <th>Order ID</th>
                <th>Customer Name</th>
                <th>Product</th>
                <th>Phone</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="orders-list">
            <tr>
                <td colspan="5" style="text-align:center; padding: 40px;">Waking up the cloud server... please wait.</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    // YOUR LIVE RENDER URL
    const BACKEND_URL = "https://subarna-apparel.onrender.com";

    // 1. Fetch Orders from Cloud
    async function fetchOrders() {
        const list = document.getElementById('orders-list');
        
        try {
            const response = await fetch(`${BACKEND_URL}/orders`);
            if (!response.ok) throw new Error("Server sleeping");
            
            const orders = await response.json();
            list.innerHTML = ""; 

            if (orders.length === 0) {
                list.innerHTML = "<tr><td colspan='5' style='text-align:center;'>No orders yet.</td></tr>";
                return;
            }

            orders.forEach(order => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><span class="status-badge">#${order.id.substring(0,5)}</span></td>
                    <td><strong>${order.customer_name}</strong></td>
                    <td>${order.product_name}</td>
                    <td>${order.phone || 'No Phone'}</td>
                    <td>
                        <button class="delete-btn" onclick="deleteOrder('${order.id}')">Delete</button>
                    </td>
                `;
                list.appendChild(row);
            });
        } catch (err) {
            console.error(err);
            list.innerHTML = "<tr><td colspan='5' style='text-align:center; color: #e53e3e;'>Backend is starting up. This can take 50 seconds. <br> <button onclick='fetchOrders()' style='margin-top:10px; cursor:pointer;'>Try Refreshing Now</button></td></tr>";
        }
    }

    // 2. Delete Order Function
    async function deleteOrder(orderId) {
        if (!confirm("Are you sure you want to delete this order?")) return;

        try {
            const response = await fetch(`${BACKEND_URL}/orders/${orderId}`, {
                method: 'DELETE'
            });

            if (response.ok) {
                alert("Order removed!");
                fetchOrders(); // Refresh list automatically
            } else {
                alert("Delete failed. Check backend.");
            }
        } catch (err) {
            alert("Connection error. Is your internet active?");
        }
    }

    // Start fetching when page loads
    fetchOrders();
</script>

</body>
</html>
