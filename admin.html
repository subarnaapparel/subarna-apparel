<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subarna Admin - Manage Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f7fafc; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .form-section { border-bottom: 2px solid #edf2f7; margin-bottom: 30px; padding-bottom: 20px; }
        input { padding: 10px; margin: 5px; border: 1px solid #cbd5e0; border-radius: 6px; }
        .btn-add { background: #48bb78; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; background: #edf2f7; }
        td { padding: 12px; border-bottom: 1px solid #edf2f7; }
        .delete-btn { background: #e53e3e; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="font-family: 'Playfair Display', serif;">Subarna Inventory Manager</h1>

    <div class="form-section">
        <h3>Add New Product</h3>
        <input type="text" id="p-name" placeholder="Product Name (e.g. Silk Saree)">
        <input type="text" id="p-price" placeholder="Price (e.g. 1200)">
        <input type="text" id="p-img" placeholder="Image URL">
        <button class="btn-add" onclick="addProduct()">Add to Shop</button>
    </div>

    <h3>Customer Orders</h3>
    <table>
        <thead>
            <tr>
                <th>Customer</th>
                <th>Product</th>
                <th>Phone</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="orders-list"></tbody>
    </table>
</div>

<script>
    const BACKEND_URL = "https://subarna-apparel.onrender.com";

    // 1. Function to Add Product
    async function addProduct() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const image = document.getElementById('p-img').value;

        if(!name || !price) return alert("Please fill Name and Price");

        try {
            const response = await fetch(`${BACKEND_URL}/products`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, price, image_url: image })
            });
            if(response.ok) {
                alert("Product Added Successfully!");
                location.reload();
            }
        } catch (err) { alert("Error adding product"); }
    }

    // 2. Fetch Orders
    async function fetchOrders() {
        const list = document.getElementById('orders-list');
        try {
            const response = await fetch(`${BACKEND_URL}/orders`);
            const orders = await response.json();
            list.innerHTML = "";
            orders.forEach(order => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${order.customer_name}</strong></td>
                    <td>${order.product_name}</td>
                    <td>${order.phone || 'N/A'}</td>
                    <td><button class="delete-btn" onclick="deleteOrder('${order.id}')">Delete</button></td>
                `;
                list.appendChild(row);
            });
        } catch (err) { list.innerHTML = "<tr><td colspan='4'>Server starting... please refresh.</td></tr>"; }
    }

    async function deleteOrder(id) {
        if(!confirm("Delete order?")) return;
        await fetch(`${BACKEND_URL}/orders/${id}`, { method: 'DELETE' });
        fetchOrders();
    }

    fetchOrders();
</script>

</body>
</html>
