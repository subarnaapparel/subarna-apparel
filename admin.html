<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subarna Admin - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f7fafc; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .tabs { border-bottom: 2px solid #edf2f7; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: none; background: none; font-weight: 600; color: #718096; }
        .tab-btn.active { color: #2d3748; border-bottom: 2px solid #2d3748; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; background: #edf2f7; padding: 12px; }
        td { padding: 12px; border-bottom: 1px solid #edf2f7; }
        .hidden { display: none; }
        #login-section { text-align: center; max-width: 400px; margin: 100px auto; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e0; border-radius: 6px; }
        .btn-main { background: #2d3748; color: white; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; border: none; }
    </style>
</head>
<body>

<div id="login-section" class="container">
    <h1 style="font-family: 'Playfair Display', serif;">Admin Login</h1>
    <input type="password" id="passcode-input" placeholder="Enter Passcode">
    <button class="btn-main" onclick="checkLogin()">Login</button>
</div>

<div id="admin-content" class="container hidden">
    <div style="display: flex; justify-content: space-between;">
        <h1 style="font-family: 'Playfair Display', serif;">Subarna Manager</h1>
        <button onclick="location.reload()" style="background:none; border:none; color:blue; cursor:pointer;">Logout</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('orders')">Orders</button>
        <button class="tab-btn" onclick="showTab('products')">Products</button>
    </div>

    <div id="orders-tab">
        <table>
            <thead><tr><th>Customer</th><th>Product</th><th>Action</th></tr></thead>
            <tbody id="orders-list"></tbody>
        </table>
    </div>

    <div id="products-tab" class="hidden">
        <table>
            <thead><tr><th>Name</th><th>Price</th><th>Stock</th></tr></thead>
            <tbody id="products-list"></tbody>
        </table>
    </div>
</div>

<script>
    const BACKEND_URL = "https://subarna-apparel.onrender.com";
    const PASSCODE = "1234"; // 🟢 Change this!

    function checkLogin() {
        if (document.getElementById('passcode-input').value === PASSCODE) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('admin-content').classList.remove('hidden');
            fetchData();
        }
    }

    function showTab(tabName) {
        document.getElementById('orders-tab').classList.toggle('hidden', tabName !== 'orders');
        document.getElementById('products-tab').classList.toggle('hidden', tabName !== 'products');
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.innerText.toLowerCase() === tabName));
    }

    async function fetchData() {
        // Fetch Orders
        const ordRes = await fetch(`${BACKEND_URL}/orders`);
        const orders = await ordRes.json();
        const ordList = document.getElementById('orders-list');
        ordList.innerHTML = orders.map(o => `<tr><td>${o.customer_name}</td><td>${o.product_name}</td><td><button onclick="deleteOrder('${o.id}')">Delete</button></td></tr>`).join('');

        // Fetch Products
        const prodRes = await fetch(`${BACKEND_URL}/products`);
        const products = await prodRes.json();
        const prodList = document.getElementById('products-list');
        prodList.innerHTML = products.map(p => `<tr><td>${p.name}</td><td>₹${p.price}</td><td>${p.stock}</td></tr>`).join('');
    }

    async function deleteOrder(id) {
        if(confirm("Delete?")) {
            await fetch(`${BACKEND_URL}/orders/${id}`, { method: 'DELETE' });
            fetchData();
        }
    }
</script>
</body>
</html>
