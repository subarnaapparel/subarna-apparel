<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subarna Admin - Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f7fafc; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 900px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        #login-section { text-align: center; max-width: 400px; margin: 0 auto; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e0; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #2d3748; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        button:hover { background: #1a202c; }
        #admin-content { display: none; } /* Hidden by default */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; background: #edf2f7; padding: 12px; }
        td { padding: 12px; border-bottom: 1px solid #edf2f7; }
        .delete-btn { background: #e53e3e; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-section" class="container">
    <h1 style="font-family: 'Playfair Display', serif;">Admin Login</h1>
    <p>Enter passcode to manage Subarna Apparel</p>
    <input type="password" id="passcode-input" placeholder="Enter Admin Passcode">
    <button onclick="checkLogin()">Login</button>
    <p id="login-error" style="color: red; display: none; margin-top: 10px;">Incorrect Passcode</p>
</div>

<div id="admin-content" class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1 style="font-family: 'Playfair Display', serif;">Order Management</h1>
        <button onclick="logout()" style="width: auto; background: #718096; padding: 8px 15px;">Logout</button>
    </div>
    <table>
        <thead>
            <tr>
                <th>Customer</th>
                <th>Product</th>
                <th>Phone</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="orders-list"></tbody>
    </table>
</div>

<script>
    const BACKEND_URL = "https://subarna-apparel.onrender.com";
    const SECRET_PASSCODE = "1234"; // 🟢 CHANGE THIS to your own secret code!

    function checkLogin() {
        const input = document.getElementById('passcode-input').value;
        if (input === SECRET_PASSCODE) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            fetchOrders();
        } else {
            document.getElementById('login-error').style.display = 'block';
        }
    }

    async function fetchOrders() {
        const list = document.getElementById('orders-list');
        list.innerHTML = "<tr><td colspan='4' style='text-align:center;'>Fetching orders...</td></tr>";
        try {
            const response = await fetch(`${BACKEND_URL}/orders`);
            const orders = await response.json();
            list.innerHTML = "";
            orders.forEach(order => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${order.customer_name}</strong></td>
                    <td>${order.product_name}</td>
                    <td>${order.phone || 'N/A'}</td>
                    <td><button class="delete-btn" onclick="deleteOrder('${order.id}')">Delete</button></td>
                `;
                list.appendChild(row);
            });
        } catch (err) {
            list.innerHTML = "<tr><td colspan='4' style='color:red;'>Error: Backend sleeping. Wait 60s and try again.</td></tr>";
        }
    }

    async function deleteOrder(orderId) {
        if (!confirm("Delete this order?")) return;
        await fetch(`${BACKEND_URL}/orders/${orderId}`, { method: 'DELETE' });
        fetchOrders();
    }

    function logout() {
        location.reload();
    }
</script>

</body>
</html>
