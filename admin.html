<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Subarna Admin - Full Control</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        .del-btn { background: #ff4444; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
        .add-btn { background: #28a745; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Add New Product</h2>
        <input type="text" id="p-name" placeholder="Name">
        <input type="number" id="p-price" placeholder="Price">
        <input type="text" id="p-img" placeholder="Image URL">
        <button class="add-btn" onclick="addProduct()">Add to Shop</button>
    </div>

    <div class="card">
        <h2>Current Inventory (Delete Products Here)</h2>
        <table>
            <thead><tr><th>Product</th><th>Price</th><th>Action</th></tr></thead>
            <tbody id="inventory-list"></tbody>
        </table>
    </div>

    <div class="card">
        <h2>Customer Orders</h2>
        <table>
            <thead><tr><th>Customer</th><th>Product</th><th>Action</th></tr></thead>
            <tbody id="orders-list"></tbody>
        </table>
    </div>

<script>
    const BACKEND_URL = "https://subarna-apparel.onrender.com";

    async function loadData() {
        // Load Products
        const pRes = await fetch(`${BACKEND_URL}/products`);
        const products = await pRes.json();
        document.getElementById('inventory-list').innerHTML = products.map(p => `
            <tr>
                <td>${p.name}</td>
                <td>₹${p.price}</td>
                <td><button class="del-btn" onclick="deleteItem('products', ${p.id})">Delete Product</button></td>
            </tr>
        `).join('');

        // Load Orders
        const oRes = await fetch(`${BACKEND_URL}/orders`);
        const orders = await oRes.json();
        document.getElementById('orders-list').innerHTML = orders.map(o => `
            <tr>
                <td>${o.customer_name}</td>
                <td>${o.product_name}</td>
                <td><button class="del-btn" onclick="deleteItem('orders', '${o.id}')">Delete Order</button></td>
            </tr>
        `).join('');
    }

    async function deleteItem(type, id) {
        if(!confirm(`Delete this ${type.slice(0,-1)}?`)) return;
        await fetch(`${BACKEND_URL}/${type}/${id}`, { method: 'DELETE' });
        loadData();
    }

    async function addProduct() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const image_url = document.getElementById('p-img').value;
        await fetch(`${BACKEND_URL}/products`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name, price, image_url })
        });
        loadData();
    }

    loadData();
</script>
</body>
</html>
