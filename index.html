<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subarna Apparel | West Bengal Marketplace</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
        :root { --primary: #1a73e8; --dark: #0f172a; --bg: #f8fafc; --success: #2ecc71; --whatsapp: #25D366; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; color: #334155; }
        
        /* Header */
        .header { text-align: center; padding: 40px 20px; background: white; border-bottom: 1px solid #e2e8f0; }
        .leaf-logo { font-size: 50px; display: inline-block; animation: sway 3.5s ease-in-out infinite; }
        @keyframes sway { 0%, 100% { transform: rotate(-10deg); } 50% { transform: rotate(10deg); } }

        /* Login Box */
        .auth-container { max-width: 400px; margin: 30px auto; padding: 25px; background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; border: 1px solid #e2e8f0; }
        .auth-input { width: 90%; padding: 12px; margin-bottom: 15px; border: 1px solid #cbd5e0; border-radius: 8px; font-size: 16px; outline: none; }
        .wa-btn { background: var(--whatsapp); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; font-size: 16px; }

        /* Grid */
        #product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .card { background: white; border-radius: 16px; overflow: hidden; border: 1px solid #e2e8f0; display: flex; flex-direction: column; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .image-box img { width: 100%; height: 250px; object-fit: cover; }
        .content { padding: 20px; flex-grow: 1; }
        .price { font-size: 1.5rem; font-weight: 800; margin-bottom: 15px; color: var(--dark); }
        
        .buy-btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--dark); color: white; font-weight: 600; cursor: pointer; margin-bottom: 10px; }
        .cart-btn { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--dark); background: white; color: var(--dark); font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div class="leaf-logo">🍁</div>
    <h1>Subarna Apparel</h1>
    <p>Authentic Saree Collections from West Bengal</p>
</div>

<div class="auth-container">
    <h3>Secure Login</h3>
    <p style="font-size: 14px; color: #64748b; margin-bottom: 20px;">Verify via WhatsApp to save your cart.</p>
    <input type="text" id="user-phone" class="auth-input" placeholder="Phone Number (e.g. 9830000000)">
    <button onclick="loginViaWhatsApp()" class="wa-btn">Verify via WhatsApp</button>
</div>

<div id="product-grid">Connecting to Subarna Marketplace...</div>

<script>
    // 1. CONFIGURATION
    const SUPABASE_URL = "https://unzhgcjequbqblogktmc.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVuemhnY2plcXVicWJsb2drdG1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MjA0NDcsImV4cCI6MjA5MTQ5NjQ0N30.cMl5AJAP686hfg7RPYlHgOcsYwPiadW-XqxYcne8sjs";
    
    // REPLACE the 0000000000 with your actual 10-digit mobile number
    const MY_NUMBER = "919732493810"; 

    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 2. WHATSAPP LOGIN
    function loginViaWhatsApp() {
        const phone = document.getElementById('user-phone').value;
        if(!phone || phone.length < 10) {
            alert("Please enter your 10-digit phone number.");
            return;
        }

        // Save phone to memory for the cart
        localStorage.setItem('subarna_user_id', phone);

        const tempID = "SUB-" + Math.floor(Math.random() * 1000000);
        const text = encodeURIComponent("Verify me for Subarna Apparel. ID: " + tempID);
        
        // FIXED LINK: No slashes between 'phone=' and the number
        const waUrl = "https://api.whatsapp.com/send?phone=" + MY_NUMBER + "&text=" + text;
        
        window.location.href = waUrl;
    }

    // 3. LOAD DATA
    async function loadData() {
        const grid = document.getElementById('product-grid');
        try {
            const { data, error } = await _supabase.from('products').select('*').order('created_at', { ascending: false });
            if (error) throw error;
            grid.innerHTML = "";
            data.forEach(item => {
                grid.innerHTML += `
                    <div class="card">
                        <div class="image-box"><img src="${item.image_url || 'https://via.placeholder.com/400'}" alt="${item.name}"></div>
                        <div class="content">
                            <h3>${item.name}</h3>
                            <div class="price">₹${(item.price / 100)}</div>
                            <button class="buy-btn" onclick="alert('Proceeding to Payment...')">Buy Now</button>
                            <button class="cart-btn" onclick="addToCart(${item.id})">Add to Cart</button>
                        </div>
                    </div>`;
            });
        } catch (err) { grid.innerHTML = "Error: " + err.message; }
    }

    // 4. ADD TO CART
    async function addToCart(productId) {
        const userPhone = localStorage.getItem('subarna_user_id');
        if (!userPhone) {
            alert("Please login via WhatsApp at the top first!");
            return;
        }
        const { error } = await _supabase.from('user_carts').insert([{ phone_number: userPhone, product_id: productId, quantity: 1 }]);
        if (!error) alert("Saree added to cart!");
        else alert("Cart Error: " + error.message);
    }

    loadData();
</script>

</body>
</html>
